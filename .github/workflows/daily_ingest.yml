name: Daily Flight Data Ingest

# Grant the bot permission to write back to the repository
permissions:
  contents: write

on:
  schedule:
    # Runs 3 times a day: Midnight, 8 AM, and 4 PM UTC
    - cron: '0 0,8,16 * * *'
  workflow_dispatch: # Allows manual testing via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv

      - name: Run ingestion script
        env:
          AVIATIONSTACK_API_KEY: ${{ secrets.AVIATIONSTACK_API_KEY }}
        run: python main.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Force add the new data files regardless of previous gitignore status
          git add -f data/raw/raw_json/*.json data/raw/raw_csv/*.csv
          # Commit only if there are changes
          git commit -m "Auto-update raw data: $(date)" || echo "No changes to commit"
          git push